<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MinMax's Map</title>
    <link rel="stylesheet" href="./styles.css?v=20260714-mobile-layout-v023">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Map and tracking controls">
        <header class="brand">
          <div>
            <h1>MinMax's Map</h1>
            <p id="appVersion" class="app-version">Version loading</p>
            <p id="mapMeta" class="database-meta">Database loading</p>
          </div>
        </header>

        <div id="workspaceTabs" class="workspace-tabs" role="tablist" aria-label="Sidebar views">
          <button id="mapWorkspaceTab" class="workspace-tab" data-workspace-view="map" type="button" role="tab" aria-controls="mapWorkspace" aria-selected="true">Map</button>
          <button id="trackingWorkspaceTab" class="workspace-tab" data-workspace-view="tracking" type="button" role="tab" aria-controls="trackingWorkspace" aria-selected="false">Tracking</button>
          <button id="settingsWorkspaceTab" class="workspace-tab" data-workspace-view="settings" type="button" role="tab" aria-controls="settingsWorkspace" aria-selected="false">Settings</button>
        </div>

        <div id="mapWorkspace" class="sidebar-workspace" role="tabpanel" aria-labelledby="mapWorkspaceTab">
          <section class="panel">
            <div id="mapTabs" class="map-tabs" role="tablist" aria-label="Maps"></div>
            <label class="search-label" for="searchInput">Search</label>
            <input id="searchInput" class="search" type="search" autocomplete="off" placeholder="Name, area, coordinate">
            <div class="toolbar" aria-label="Filters">
              <button id="selectAllButton" type="button">All</button>
              <button id="selectNoneButton" type="button">Reset</button>
            </div>
          </section>

          <section class="panel item-panel">
            <div class="panel-heading">
              <h2>Filter</h2>
              <span id="filterCount" class="filter-count" aria-live="polite">0 / 0</span>
            </div>
            <div id="layerTabs" class="layer-tabs" role="tablist" aria-label="Marker layers"></div>
            <div id="itemList" class="item-list"></div>
          </section>

          <section class="panel detail-panel" aria-live="polite">
            <div class="panel-heading">
              <h2>Selection</h2>
            </div>
            <div id="selectionDetail" class="selection empty">No marker selected</div>
          </section>
        </div>

        <section id="trackingWorkspace" class="tracking-workspace" role="tabpanel" aria-labelledby="trackingWorkspaceTab" hidden>
          <div class="panel-heading">
            <h2>Tracking</h2>
            <span id="trackingCount" class="filter-count" aria-live="polite">0 tracked</span>
          </div>
          <div id="trackingList" class="tracking-list"></div>
        </section>

        <section id="settingsWorkspace" class="settings-workspace" role="tabpanel" aria-labelledby="settingsWorkspaceTab" hidden>
          <div class="panel-heading">
            <h2>Settings</h2>
          </div>
          <div id="settingsContent" class="settings-content"></div>
        </section>
      </aside>

      <section class="map-panel" aria-label="Interactive map">
        <div class="map-toolbar">
          <button id="zoomOutButton" type="button" aria-label="Zoom out">-</button>
          <button id="zoomInButton" type="button" aria-label="Zoom in">+</button>
          <button id="fitButton" type="button">Fit</button>
        </div>
        <div id="coordinateReadout" class="coordinate-readout">X 0, Y 0</div>
        <div id="mapViewport" class="map-viewport">
          <div id="mapWorld" class="map-world">
            <div id="mapTiles" class="map-tiles" aria-hidden="true"></div>
            <img id="mapImage" class="map-image" alt="">
            <div id="pinLayer" class="pin-layer"></div>
          </div>
          <canvas id="pinCanvas" class="pin-canvas" aria-hidden="true"></canvas>
          <div id="pinTooltip" class="pin-tooltip" hidden></div>
        </div>
        <section id="mobileSelectionPanel" class="panel mobile-selection-panel is-minimized" aria-live="polite" hidden>
          <div class="panel-heading mobile-selection-heading">
            <h2>Selection</h2>
            <button id="mobileSelectionToggle" class="mobile-selection-toggle" type="button" aria-controls="mobileSelectionDetail" aria-expanded="false" aria-label="Expand selection" title="Expand selection">+</button>
          </div>
          <div id="mobileSelectionDetail" class="selection empty">No marker selected</div>
        </section>
      </section>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./app-config.js?v=20260714-mobile-layout-v023"></script>
    <script defer src="./app.js?v=20260714-mobile-layout-v023"></script>
  </body>
</html>
